name: salon_pos
description: "일본 살롱 전용 POS — Offline-First SQLite"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # DB
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # 상태 관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 라우팅
  go_router: ^14.0.0

  # 유틸
  uuid: ^4.0.0
  intl: ^0.20.1
  shared_preferences: ^2.0.0
  connectivity_plus: ^6.0.0

  # UI
  flutter_svg: ^2.0.0
  cached_network_image: ^3.0.0
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 코드 생성
  drift_dev: ^2.24.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  generate: true          # flutter_localizations 자동 생성
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: NotoSansJP
      fonts:
        - asset: assets/fonts/NotoSansJP-Regular.ttf
        - asset: assets/fonts/NotoSansJP-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansJP-Bold.ttf
          weight: 700
